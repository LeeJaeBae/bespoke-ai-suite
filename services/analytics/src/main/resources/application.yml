spring:
  application:
    name: analytics-service
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bespoke_analytics}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: analytics
        jdbc:
          time_zone: UTC
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:analytics-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.bespoke.analytics.application.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour
  
  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours

# Server Configuration
server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
  http2:
    enabled: true

# Management & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1

# Logging Configuration
logging:
  level:
    com.bespoke.analytics: ${LOG_LEVEL:INFO}
    org.springframework.kafka: WARN
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

# Custom Application Properties
# Application Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}

analytics:
  # Time Series Database Configuration
  timeseries:
    influxdb:
      url: ${INFLUXDB_URL:http://localhost:8086}
      token: ${INFLUXDB_TOKEN:}
      org: ${INFLUXDB_ORG:bespoke}
      bucket: ${INFLUXDB_BUCKET:analytics}
    
    timescaledb:
      enabled: ${TIMESCALEDB_ENABLED:true}
      retention-policy: ${RETENTION_POLICY:30d}
  
  # External Services
  external:
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8080}
      timeout: 5000
    content-service:
      url: ${CONTENT_SERVICE_URL:http://localhost:8081}
      timeout: 5000
    campaign-service:
      url: ${CAMPAIGN_SERVICE_URL:http://localhost:8082}
      timeout: 5000
  
  # Analytics Processing
  processing:
    batch-size: ${BATCH_SIZE:1000}
    parallel-processing: ${PARALLEL_PROCESSING:true}
    max-threads: ${MAX_THREADS:10}
  
  # Feature Flags
  features:
    real-time-analytics: ${REAL_TIME_ANALYTICS:true}
    predictive-analytics: ${PREDICTIVE_ANALYTICS:true}
    advanced-reporting: ${ADVANCED_REPORTING:true}

---
# Local Development Profile
spring:
  config:
    activate:
      on-profile: local
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.bespoke.analytics: DEBUG
    org.hibernate.SQL: DEBUG

analytics:
  processing:
    parallel-processing: false
    max-threads: 2

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  
  kafka:
    consumer:
      bootstrap-servers: ${spring.embedded.kafka.brokers}
    producer:
      bootstrap-servers: ${spring.embedded.kafka.brokers}

---
# Production Profile
spring:
  config:
    activate:
      on-profile: production
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.bespoke.analytics: INFO
    org.hibernate.SQL: WARN

management:
  tracing:
    sampling:
      probability: 0.01