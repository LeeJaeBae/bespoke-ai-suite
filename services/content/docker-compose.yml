version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: content-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: bespoke_content
    volumes:
      - mongodb_data:/data/db
    networks:
      - content-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: content-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - content-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: content-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - content-network

  # Uncomment to run the service via Docker
  # content-service:
  #   build: .
  #   container_name: content-service
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - NODE_ENV=development
  #     - MONGODB_URI=mongodb://admin:password@mongodb:27017/bespoke_content?authSource=admin
  #     - KAFKA_BROKERS=kafka:9092
  #   depends_on:
  #     - mongodb
  #     - kafka
  #   networks:
  #     - content-network

volumes:
  mongodb_data:

networks:
  content-network:
    driver: bridge